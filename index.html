        '파란색': "🌊 생명력을 상징하는 파란 깃발! 막혔던 일들이 시원하게 뚫립니다.",
        '하얀색': "🕊️ 명예를 뜻하는 하얀 깃발! 귀인의 도움을 받아 뜻을 이룹니다.",
        '초록색': "🌿 성장을 상징하는 초록 깃발! 신중한 선택이 큰 보상으로 돌아옵니다."
    };

    // --- BGM 자동 재생 로직 ---
    const bgm = document.getElementById('mysticBgm');
    bgm.volume = 0.5;
    
    // 사용자가 화면을 처음 터치/클릭할 때 음악을 강제 재생 (모바일 브라우저 정책 우회)
    function playMusicOnce() {
        bgm.play().catch(e => console.log("자동재생 차단: " + e));
        document.removeEventListener('click', playMusicOnce);
        document.removeEventListener('touchstart', playMusicOnce);
    }
    document.addEventListener('click', playMusicOnce);
    document.addEventListener('touchstart', playMusicOnce);
    // ----------------------------

    function getZodiacSign(month, day) {
        if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "물병자리";
        if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "물고기자리";
        if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "양자리";
        if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "황소자리";
        if ((month == 5 && day >= 21) || (month == 6 && day <= 21)) return "쌍둥이자리";
        if ((month == 6 && day >= 22) || (month == 7 && day <= 22)) return "게자리";
        if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "사자자리";
        if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "처녀자리";
        if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "천칭자리";
        if ((month == 10 && day >= 23) || (month == 11 && day <= 22)) return "전갈자리";
        if ((month == 11 && day >= 23) || (month == 12 && day <= 24)) return "사수자리";
        return "염소자리";
    }

    function drawFlag(color) {
        const bMonth = document.getElementById('birthMonth').value;
        const bDay = document.getElementById('birthDay').value;

        if (!bMonth || !bDay) {
            alert("태어난 월과 일을 먼저 선택해 주세요!");
            return;
        }

        // 깃발 클릭 시에도 혹시 안 켜졌을 음악 재생 보장
        bgm.play().catch(e => console.log(e));

        const currentDate = new Date();
        const tYear = currentDate.getFullYear();
        const tMonth = currentDate.getMonth() + 1;

        document.getElementById('flagMessage').innerText = flagMeanings[color];
        
        const myZodiac = getZodiacSign(parseInt(bMonth), parseInt(bDay));
        
        const myFortune = trueZodiacDB.find(item => 
            item.연도 === tYear && 
            item.월 === tMonth && 
            item.별자리 === myZodiac
        );

        if (myFortune) {
            document.getElementById('resultTitle').innerText = `${tMonth}월의 신묘한 운세 풀이`;
            document.getElementById('resTotal').innerText = myFortune.총운;
            document.getElementById('resWealth').innerText = myFortune.재물운;
            document.getElementById('resLove').innerText = myFortune.애정운;
            document.getElementById('resHealth').innerText = myFortune.건강운;
            document.getElementById('resCareer').innerText = myFortune.직장학업운;
            document.getElementById('resColor').innerText = myFortune.행운의색상;
            document.getElementById('resNumber').innerText = myFortune.행운의숫자;
            document.getElementById('resItem').innerText = myFortune.행운의아이템;

            const resultSection = document.getElementById('result-section');
            resultSection.style.display = 'block';
            
            // 모바일에서 자연스럽게 스크롤
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        } else {
            alert("데이터베이스 범위를 벗어났습니다. (2026~2030년 데이터만 제공합니다)");
        }
    }
</script>
